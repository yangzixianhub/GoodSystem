server:
  port: 8080

app:
  datasource:
    mode: ${APP_DATASOURCE_MODE:routing}
    shard0-url: ${APP_DATASOURCE_SHARD0_URL:}
    shard1-url: ${APP_DATASOURCE_SHARD1_URL:}

spring:
  application:
    name: spring-jwt-login
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 300000
      validation-query: select 1
      test-while-idle: true
    master:
      url: ${SPRING_DATASOURCE_MASTER_URL:jdbc:mysql://localhost:3306/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false}
    slave:
      url: ${SPRING_DATASOURCE_SLAVE_URL:jdbc:mysql://localhost:3307/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:seckill-order-consumer}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: dev.wanheng.springjwtlogin.messaging

seckill:
  kafka:
    consistency-topic: seckill-consistency-event
  snowflake:
    worker-id: ${SECKILL_SNOWFLAKE_WORKER_ID:1}
    datacenter-id: ${SECKILL_SNOWFLAKE_DATACENTER_ID:1}
  event:
    dispatch-interval-ms: 1000

mybatis:
  mapper-locations: classpath*:mapper/*.xml