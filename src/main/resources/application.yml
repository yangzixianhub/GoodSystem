server:
  port: 8080
spring:
  application:
    name: spring-jwt-login
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 300000
      validation-query: select 1
      test-while-idle: true
    master:
      url: ${SPRING_DATASOURCE_MASTER_URL:jdbc:mysql://localhost:3306/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false}
    slave:
      url: ${SPRING_DATASOURCE_SLAVE_URL:jdbc:mysql://localhost:3307/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}

mybatis:
  mapper-locations: classpath*:mapper/*.xml