services:
  mysql-master:
    image: mysql:8.0
    container_name: goodsystem-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: message
      TZ: Asia/Shanghai
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./docker/mysql-master/conf.d:/etc/mysql/conf.d
      - ./docker/mysql-master/init:/docker-entrypoint-initdb.d
    networks:
      - goodsystem-net

  mysql-slave:
    image: mysql:8.0
    container_name: goodsystem-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      TZ: Asia/Shanghai
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4
    depends_on:
      - mysql-master
    ports:
      - "3307:3306"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./docker/mysql-slave/conf.d:/etc/mysql/conf.d
      - ./docker/mysql-slave/init:/docker-entrypoint-initdb.d
    networks:
      - goodsystem-net

  redis:
    image: redis:7-alpine
    container_name: goodsystem-redis
    ports:
      - "6379:6379"
    networks:
      - goodsystem-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: goodsystem-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - goodsystem-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: goodsystem-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - goodsystem-net

  backend1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodsystem-backend1
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
      - elasticsearch
      - kafka
    environment:
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      REDIS_HOST: redis
      ES_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECKILL_SNOWFLAKE_WORKER_ID: 1
      APP_DATASOURCE_MODE: sharding
      TZ: Asia/Shanghai
    ports:
      - "8081:8080"
    networks:
      - goodsystem-net

  backend2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodsystem-backend2
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
      - elasticsearch
      - kafka
    environment:
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/message?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      REDIS_HOST: redis
      ES_URIS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECKILL_SNOWFLAKE_WORKER_ID: 2
      APP_DATASOURCE_MODE: sharding
      TZ: Asia/Shanghai
    ports:
      - "8082:8080"
    networks:
      - goodsystem-net

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: goodsystem-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - goodsystem-net

  nginx:
    image: nginx:1.25
    container_name: goodsystem-nginx
    depends_on:
      - backend1
      - backend2
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - goodsystem-net

networks:
  goodsystem-net:

volumes:
  mysql_master_data:
  mysql_slave_data:
  es_data: