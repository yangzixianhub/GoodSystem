services:
  db:
    image: mysql:8.0
    container_name: goodsystem-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: message
      TZ: Asia/Shanghai
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - goodsystem-net

  redis:
    image: redis:7-alpine
    container_name: goodsystem-redis
    ports:
      - "6379:6379"
    networks:
      - goodsystem-net

  backend1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodsystem-backend1
    depends_on:
      - db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/message?autoReconnect=true&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      REDIS_HOST: redis
      TZ: Asia/Shanghai
    ports:
      - "8081:8080"
    networks:
      - goodsystem-net

  backend2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodsystem-backend2
    depends_on:
      - db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/message?autoReconnect=true&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      REDIS_HOST: redis
      TZ: Asia/Shanghai
    ports:
      - "8082:8080"
    networks:
      - goodsystem-net

  nginx:
    image: nginx:1.25
    container_name: goodsystem-nginx
    depends_on:
      - backend1
      - backend2
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - goodsystem-net

networks:
  goodsystem-net:

volumes:
  db_data: