<!DOCTYPE html>
<!-- GoodSystem-styled-v1 若源码里能看到这行说明当前用的是最新前端 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 商品库存与秒杀系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrap">
    <header class="site-header">
      <div class="logo-wrap">
        <h1 class="logo">商品库存与秒杀系统</h1>
        <span class="badge">秒杀</span>
      </div>
      <p class="tagline">登录后参与秒杀</p>
    </header>

    <main class="main-content">
      <section class="card login-card">
        <h2>登录</h2>
        <p class="subtitle">使用账号密码登录系统</p>
        <form id="loginForm" class="form">
          <div class="field">
            <label for="login-username">用户名</label>
            <input type="text" id="login-username" name="username" required autocomplete="username" placeholder="请输入用户名">
          </div>
          <div class="field">
            <label for="login-password">密码</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="请输入密码">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">登录</button>
          </div>
        </form>
        <p class="switch-form">
          还没有账号？<a href="register.html">立即注册</a>
        </p>
        <div id="loginMessage" class="message" role="alert" hidden></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>分布式作业 HW1 · GoodSystem</p>
    </footer>
  </div>
  <script src="js/app.js"></script>
  <script>
    (function() {
      var form = document.getElementById('loginForm');
      var msgEl = document.getElementById('loginMessage');
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var username = document.getElementById('login-username').value.trim();
        var password = document.getElementById('login-password').value;
        app.showMessage(msgEl, '');
        app.login(username, password)
          .then(function(res) {
            if (res.success && res.data && res.data.token) {
              app.setToken(res.data.token);
              app.showMessage(msgEl, '登录成功，正在跳转…', 'success');
              setTimeout(function() { window.location.href = 'index.html'; }, 800);
            } else {
              app.showMessage(msgEl, res.msg || '登录失败', 'error');
            }
          })
          .catch(function(err) {
            app.showMessage(msgEl, err.message || '网络错误，请重试', 'error');
          });
      });
    })();
  </script>
</body>
</html>
